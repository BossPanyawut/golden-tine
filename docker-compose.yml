services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: golden_tine
      POSTGRES_PASSWORD: golden_tine
      POSTGRES_DB: golden_tine
    ports:
      - "5432:5432"
    volumes:
      - golden_tine_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U golden_tine"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  golden_tine_postgres:
