name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  AUTH_SECRET: ci-only-secret-not-used-in-production-0123456789
  ALLOW_PUBLIC_SIGNUP: "true"
  NEXTAUTH_URL: http://localhost:3000

jobs:
  lint-typecheck-unit:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgres://golden_tine:golden_tine@localhost:5432/golden_tine
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test

  e2e:
    runs-on: ubuntu-latest
    needs: lint-typecheck-unit
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: golden_tine
          POSTGRES_PASSWORD: golden_tine
          POSTGRES_DB: golden_tine
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U golden_tine"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgres://golden_tine:golden_tine@localhost:5432/golden_tine
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm db:migrate
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm test:e2e
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
